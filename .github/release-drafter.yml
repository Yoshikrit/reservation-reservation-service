name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

categories:
  - title: '🚀 Features'
    labels: ['feat', 'feature']
  - title: '🐛 Bug Fixes'
    labels: ['fix', 'bug']
  - title: '🧹 Maintenance'
    labels: ['chore', 'refactor', 'docs']

version-resolver:
  major:
    labels: ['major', 'breaking']
  minor:
    labels: ['feat', 'feature']
  patch:
    labels: ['fix', 'bug', 'chore']
  default: patch

change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
