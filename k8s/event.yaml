apiVersion: apps/v1
kind: Deployment
metadata:
  name: reservation-event
  namespace: reservation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reservation-event
  template:
    metadata:
      labels:
        app: reservation-event
    spec:
      automountServiceAccountToken: false
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: event
          image: ghcr.io/yoshikrit/reservation:1
          imagePullPolicy: IfNotPresent
          command: ["./event"]
          env:
            - name: OTEL_SERVICE_NAME
              value: "reservation-event"
          envFrom:
            - configMapRef:
                name: reservation-config
            - secretRef:
                name: reservation-secret
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
              ephemeral-storage: 50Mi
            limits:
              cpu: 100m
              memory: 64Mi
              ephemeral-storage: 100Mi
          # No probe: outbox relay exposes no port. k8s restarts on process exit.
          # To add a real liveness probe, expose a /livez HTTP port from the event process.
